name: Build dtbo.img only

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout kernel source
      uses: actions/checkout@v3

    - name: Set up build environment
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison flex libssl-dev make libc6-dev libncurses5-dev gcc clang python3 unzip wget git cpio rsync

    - name: Download toolchain
      run: |
        mkdir -p toolchains
        cd toolchains
        git clone --depth=1 https://github.com/kdrag0n/proton-clang clang

    - name: Compile DTBO image
      run: |
        export PATH="$GITHUB_WORKSPACE/toolchains/clang/bin:$PATH"
        export ARCH=arm64
        export SUBARCH=arm64
        export CROSS_COMPILE=aarch64-linux-gnu-
        export CLANG_TRIPLE=aarch64-linux-gnu-

        make O=out dtboimg

    - name: Upload dtbo.img
      uses: actions/upload-artifact@v3
      with:
        name: dtbo
        path: out/arch/arm64/boot/dtbo.img
